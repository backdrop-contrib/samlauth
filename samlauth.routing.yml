samlauth.saml_controller_login:
  path: '/saml/login'
  defaults:
    _controller: '\Drupal\samlauth\Controller\SamlController::login'
    _title: 'SAML login'
  requirements:
    _user_is_logged_in: 'FALSE'
  options:
    _maintenance_access: TRUE
    no_cache: TRUE
    default_url_options:
      path_processing: FALSE
samlauth.saml_controller_reauth:
  path: '/saml/reauth'
  defaults:
    _controller: '\Drupal\samlauth\Controller\SamlController::reauth'
    _title: 'SAML force login'
  requirements:
    _access: 'TRUE'
  options:
    _maintenance_access: TRUE
    no_cache: TRUE
    default_url_options:
      path_processing: FALSE
samlauth.saml_controller_logout:
  path: '/saml/logout'
  defaults:
    _controller: '\Drupal\samlauth\Controller\SamlController::logout'
    _title: 'SAML logout'
  requirements:
    _access: 'TRUE'
  options:
    _maintenance_access: TRUE
    no_cache: TRUE
    default_url_options:
      path_processing: FALSE
samlauth.saml_controller_metadata:
  path: '/saml/metadata'
  defaults:
    _controller: '\Drupal\samlauth\Controller\SamlController::metadata'
    _title: 'SAML metadata'
  requirements:
    _permission: 'view sp metadata'
  options:
    default_url_options:
      path_processing: FALSE
samlauth.saml_controller_acs:
  path: '/saml/acs'
  defaults:
    _controller: '\Drupal\samlauth\Controller\SamlController::acs'
    _title: 'SAML ACS'
  requirements:
    _access: 'TRUE'
  options:
    _maintenance_access: TRUE
    no_cache: TRUE
    default_url_options:
      path_processing: FALSE
samlauth.saml_controller_sls:
  path: '/saml/sls'
  defaults:
    _controller: '\Drupal\samlauth\Controller\SamlController::sls'
    _title: 'SAML SLS'
  requirements:
    _access: 'TRUE'
  options:
    _maintenance_access: TRUE
    no_cache: TRUE
    default_url_options:
      path_processing: FALSE
samlauth.saml_controller_changepw:
  path: '/saml/changepw'
  defaults:
    _controller: '\Drupal\samlauth\Controller\SamlController::changepw'
    _title: 'SAML change password'
  requirements:
    _user_is_logged_in: 'TRUE'
  options:
    default_url_options:
      path_processing: FALSE
samlauth.saml_configure_form:
  path: '/admin/config/people/saml/saml'
  defaults:
    _form: '\Drupal\samlauth\Form\SamlauthSamlConfigureForm'
    _title: 'SAML communication setup'
  requirements:
    _permission: 'configure saml'
  options:
    _admin_route: TRUE
samlauth.samlauth_configure_form:
  path: '/admin/config/people/saml'
  defaults:
    _form: '\Drupal\samlauth\Form\SamlauthConfigureForm'
    _title: 'SAML login / user configuration'
  requirements:
    _permission: 'configure saml'
  options:
    _admin_route: TRUE
# Delete in 4.0 (along with hook_views_data). Only kept here (instead of
# changing URL in DeleteLink) so people don't need to change permissions yet.
samlauth.authmap_delete_form:
  path: '/admin/config/people/saml/authmap/{uid}/delete'
  defaults:
    _form: '\Drupal\samlauth\Form\SamlauthAuthmapDeleteForm'
    _title: 'Delete authmap entry'
  requirements:
    _permission: 'configure saml'
# Added to support multiple IDPs
# If this gets accepted as future work, should this get moved above
# the route being deleted above?
entity.idp.collection:
  path: '/admin/configuration/people/saml/idp'
  defaults:
    _entity_list: 'idp'
    _title: 'Identity Providers'
  requirements:
    _permission: 'manage identity providers'
entity.idp.add_form:
  path: '/admin/configuration/people/saml/idp/add'
  defaults:
    _entity_form: 'idp.add'
    _title: 'Add an Identity Provider'
  requirements:
    _permission: 'administer identity providers'
entity.idp.edit_form:
  path: '/admin/configuration/people/saml/idp/{idp}'
  defaults:
    _entity_form: 'idp.edit'
    _title: 'Edit a MiLogin IdP'
  requirements:
    _permission: 'administer identity providers'
entity.idp.delete_form:
  path: '/admin/configuration/people/saml/idp/{idp}/delete'
  defaults:
    _entity_form: 'idp.delete'
    _title: 'Delete an Identity Provider'
  requirements:
    _permission: 'administer identity providers'
